apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: t4workspaces.cluster.t4.dev
spec:
  group: cluster.t4.dev
  scope: Namespaced
  names:
    plural: t4workspaces
    singular: t4workspace
    kind: T4Workspace
    listKind: T4WorkspaceList
    shortNames: [t4ws]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: PVC
          type: string
          jsonPath: .status.pvcName
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [hostRef, displayName, owner, size, retentionPolicy]
              x-kubernetes-validations:
                - rule: "!has(self.repository) || !has(self.repository.commit) || (has(self.repository.ref) && self.repository.ref != '')"
                  message: repository commit requires an explicit ref
              properties:
                hostRef:
                  type: string
                  minLength: 1
                  maxLength: 253
                  pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: hostRef is immutable
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 128
                owner:
                  type: string
                  minLength: 1
                  maxLength: 256
                  pattern: '^[A-Za-z0-9][A-Za-z0-9._:@/-]*$'
                repository:
                  type: object
                  required: [repositoryId]
                  properties:
                    repositoryId:
                      type: string
                      minLength: 1
                      maxLength: 128
                      pattern: '^[A-Za-z0-9][A-Za-z0-9._:/-]*$'
                    ref:
                      type: string
                      minLength: 1
                      maxLength: 256
                    commit:
                      type: string
                      minLength: 7
                      maxLength: 64
                      pattern: '^[0-9a-fA-F]+$'
                size:
                  type: string
                  minLength: 2
                  maxLength: 32
                  pattern: '^[1-9][0-9]*(Ei|Pi|Ti|Gi|Mi|Ki|E|P|T|G|M|K)$'
                retentionPolicy:
                  type: string
                  enum: [Retain, Delete]
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: retentionPolicy is immutable
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  minimum: 0
                pvcName:
                  type: string
                  minLength: 1
                  maxLength: 63
                pvcPhase:
                  type: string
                  enum: [Pending, Bound, Lost]
                capacity:
                  type: string
                  minLength: 1
                  maxLength: 32
                phase:
                  type: string
                  enum: [Pending, Ready, Failed, Terminating, Unknown]
                conditions:
                  type: array
                  maxItems: 8
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, message, lastTransitionTime]
                    properties:
                      type:
                        type: string
                        enum: [StorageReady, Ready, HostReady]
                      status:
                        type: string
                        enum: ['True', 'False', Unknown]
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        format: date-time
                        maxLength: 64
                      reason:
                        type: string
                        minLength: 1
                        maxLength: 64
                        pattern: '^[A-Za-z][A-Za-z0-9]*$'
                      message:
                        type: string
                        maxLength: 512
