{{- if and .Values.enabled .Values.observability.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "server") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames: [{{ .Release.Namespace | quote }}]
  selector:
    matchLabels:
      {{- include "t4-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: "t4-cluster"
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval | quote }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "controller") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames: [{{ .Release.Namespace | quote }}]
  selector:
    matchLabels:
      {{- include "t4-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
      app.kubernetes.io/part-of: "t4-cluster"
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval | quote }}
{{- end }}
{{- if and .Values.enabled .Values.observability.prometheusRule.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "t4-cluster.fullname" . | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    {{- with .Values.observability.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: t4-cluster-ha
      rules:
        - alert: T4ClusterServerBelowQuorum
          expr: kube_deployment_status_replicas_available{namespace={{ .Release.Namespace | quote }},deployment={{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "server") | quote }}} < 2
          for: 5m
          labels: {severity: critical}
          annotations:
            summary: T4 cluster server has fewer than two available replicas
        - alert: T4ClusterReconcileErrors
          expr: increase(controller_runtime_reconcile_errors_total{namespace={{ .Release.Namespace | quote }},controller=~"t4clusterhost|t4workspace|t4session"}[10m]) > 0
          for: 10m
          labels: {severity: warning}
          annotations:
            summary: T4 cluster operator reconciliation is failing
        - alert: T4WorkspaceStoragePending
          expr: max by (namespace, persistentvolumeclaim) (kube_persistentvolumeclaim_status_phase{namespace={{ .Release.Namespace | quote }},phase=~"Pending|Lost"}) == 1
          for: 15m
          labels: {severity: warning}
          annotations:
            summary: A PVC in the T4 namespace is pending or lost
{{- end }}
