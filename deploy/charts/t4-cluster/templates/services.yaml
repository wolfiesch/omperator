{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "server") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    {{- include "t4-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: websocket
      port: 8080
      targetPort: websocket
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "metrics") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    {{- include "t4-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: metrics
      port: 9090
      targetPort: admin
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "controller-metrics") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    {{- include "t4-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "t4-cluster.suffixedName" (dict "context" . "suffix" "server") | quote }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  minAvailable: 2
  selector:
    matchLabels:
      {{- include "t4-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
{{- end }}
