when:
  - event:
      - push
      - pull_request
      - manual

clone:
  git:
    image: mirror.gcr.io/woodpeckerci/plugin-git:2.6.5@sha256:2b34ecbbfd2f318405bd5d2765a750f6b02dae5dfb8707e16c943b9faeef5fc5
    settings:
      depth: 50
      partial: false

steps:
  dependencies:
    image: mirror.gcr.io/library/node:24.13.1-bookworm@sha256:00e9195ebd49985a6da8921f419978d85dfe354589755192dc090425ce4da2f7
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - mkdir -p .ci && cp /etc/ssl/certs/ca-certificates.crt .ci/ca-certificates.crt
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 4Gi

  bun-runtime:
    depends_on: [dependencies]
    image: mirror.gcr.io/oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    commands:
      - cp "$(command -v bun)" .ci/bun
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 64Mi
            ephemeral-storage: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 256Mi

  upstream-core:
    depends_on: [cluster-ci-contracts, bun-runtime]
    image: mirror.gcr.io/library/node:24.13.1-bookworm@sha256:00e9195ebd49985a6da8921f419978d85dfe354589755192dc090425ce4da2f7
    commands:
      - export PATH="$PWD/.ci:$PATH"
      - corepack enable
      - pnpm check
      - VP_RUN_CONCURRENCY_LIMIT=1 pnpm test
      - pnpm build
      - pnpm exec playwright install --with-deps chromium
      - pnpm test:e2e
      - pnpm test:packaging
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 1Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: "2"
            memory: 6Gi
            ephemeral-storage: 8Gi

  upstream-tooling:
    depends_on: [upstream-core]
    image: mirror.gcr.io/library/node:24.13.1-bookworm@sha256:00e9195ebd49985a6da8921f419978d85dfe354589755192dc090425ce4da2f7
    commands:
      - apt-get update && apt-get install -y --no-install-recommends jq && rm -rf /var/lib/apt/lists/*
      - corepack enable
      - pnpm test:tooling
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

  legacy-authority-source:
    depends_on: [upstream-tooling]
    image: mirror.gcr.io/alpine/git:2.49.1@sha256:c0280cf9572316299b08544065d3bf35db65043d5e3963982ec50647d2746e26
    commands:
      - git init .continuity/omp
      - git -C .continuity/omp remote add origin https://github.com/lyc-aon/oh-my-pi.git
      - git -C .continuity/omp fetch --depth=1 origin 8476f4451ed95c5d5401785d279a93d3c659fac4
      - git -C .continuity/omp checkout --detach FETCH_HEAD
      - test "$(git -C .continuity/omp rev-parse HEAD)" = 8476f4451ed95c5d5401785d279a93d3c659fac4
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 128Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 1Gi

  legacy-authority-build:
    depends_on: [legacy-authority-source, bun-runtime]
    image: docker.io/library/rust:1.86-slim-bookworm@sha256:57d415bbd61ce11e2d5f73de068103c7bd9f3188dc132c97cef4a8f62989e944
    environment:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
      CARGO_TARGET_DIR: /tmp/t4-legacy-authority-target
      CARGO_INCREMENTAL: "0"
    commands:
      - sh scripts/cluster-ci/install-legacy-authority-toolchain.sh
      - (cd .continuity/omp && bun install --frozen-lockfile)
      - (cd .continuity/omp && bun run build:native)
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: "2"
            memory: 6Gi
            ephemeral-storage: 12Gi

  legacy-bridge-continuity:
    depends_on: [legacy-authority-build]
    image: mirror.gcr.io/library/node:24.13.1-bookworm@sha256:00e9195ebd49985a6da8921f419978d85dfe354589755192dc090425ce4da2f7
    environment:
      T4_OMP_SOURCE_DIR: .continuity/omp
    commands:
      - corepack enable
      - pnpm test:legacy-bridge-continuity
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

